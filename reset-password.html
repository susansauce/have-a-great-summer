<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Reset Password — Have a Great Summer</title>
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#2C2350; --ink-soft:#6A6190;
    --coral:#FF5A7A; --grape:#8B6CF0; --lime:#37C97A;
    --display:'Fredoka',system-ui,sans-serif; --body:'Nunito',system-ui,-apple-system,sans-serif;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;font-family:var(--body);color:var(--ink);
    background:radial-gradient(1200px 600px at 12% -8%, #FFE6B8 0%, transparent 55%),
      radial-gradient(1000px 600px at 100% 0%, #FFC7DE 0%, transparent 50%), #FFF7EC;
    min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;
    -webkit-font-smoothing:antialiased;padding:20px;
  }
  .card{
    background:rgba(255,255,255,.8);border:2px solid #fff;border-radius:26px;
    padding:clamp(28px,4vw,48px);width:min(92vw,440px);
    box-shadow:0 32px 64px -24px rgba(44,35,80,.4);
  }
  h1{font-family:var(--display);font-weight:700;font-size:32px;margin:0 0 8px;color:var(--ink);}
  .sub{font-size:15px;color:var(--ink-soft);font-weight:600;margin:0 0 28px;}
  label{display:block;font-family:var(--display);font-weight:600;font-size:13px;margin-bottom:6px;}
  input{
    width:100%;font-family:var(--body);font-weight:600;font-size:16px;color:var(--ink);
    padding:12px 14px;border-radius:13px;border:2px solid #efe6f5;background:#fff;margin-bottom:16px;
  }
  input:focus{outline:none;border-color:var(--grape);box-shadow:0 0 0 4px rgba(139,108,240,.18);}
  .err{color:var(--coral);font-size:13px;min-height:18px;margin-bottom:8px;font-weight:600;}
  button{
    width:100%;font-family:var(--display);font-weight:700;font-size:17px;color:#fff;cursor:pointer;border:none;
    padding:14px;border-radius:14px;background:linear-gradient(95deg,var(--coral),var(--grape));
    box-shadow:0 12px 26px -10px rgba(255,90,122,.5);
  }
  button:disabled{opacity:.6;cursor:default;}
  .success{text-align:center;display:none;}
  .success-icon{
    width:64px;height:64px;border-radius:50%;background:linear-gradient(135deg,var(--lime),#3CB4FF);
    display:flex;align-items:center;justify-content:center;font-size:28px;color:#fff;
    margin:0 auto 20px;font-weight:700;
  }
  .back{display:inline-block;margin-top:20px;font-family:var(--display);font-weight:700;
    font-size:15px;color:var(--grape);text-decoration:none;}
  .invalid{text-align:center;}
  .invalid h1{color:var(--coral);}
</style>
</head>
<body>

<div class="card" id="resetCard">
  <h1>Set new password</h1>
  <p class="sub">Choose a new password for your account.</p>
  <label for="newPassword">New password</label>
  <input type="password" id="newPassword" placeholder="At least 6 characters" autocomplete="new-password" />
  <label for="confirmPassword">Confirm password</label>
  <input type="password" id="confirmPassword" placeholder="Same password again" autocomplete="new-password" />
  <div class="err" id="resetErr"></div>
  <button id="resetBtn" onclick="handleReset()">Update password</button>
</div>

<div class="card success" id="successCard">
  <div class="success-icon">&#x2713;</div>
  <h1>Password updated!</h1>
  <p class="sub">You can now sign in with your new password.</p>
  <a class="back" href="/">Go back to the site</a>
</div>

<div class="card invalid" id="invalidCard" style="display:none">
  <h1>Link expired</h1>
  <p class="sub">This password reset link has expired or already been used. Request a new one from the sign in page.</p>
  <a class="back" href="/">Back to site</a>
</div>

<script>
  let accessToken = null;

  function getTokenFromHash(){
    const hash = window.location.hash.substring(1);
    const params = new URLSearchParams(hash);
    const type = params.get('type');
    const token = params.get('access_token');
    if(type === 'recovery' && token) return token;
    return null;
  }

  window.addEventListener('load', () => {
    accessToken = getTokenFromHash();
    if(!accessToken){
      document.getElementById('resetCard').style.display = 'none';
      document.getElementById('invalidCard').style.display = 'block';
    }
  });

  async function handleReset(){
    const newPassword = document.getElementById('newPassword').value;
    const confirmPassword = document.getElementById('confirmPassword').value;
    const errEl = document.getElementById('resetErr');
    const btn = document.getElementById('resetBtn');
    errEl.textContent = '';
    if(newPassword.length < 6){ errEl.textContent = 'Password must be at least 6 characters.'; return; }
    if(newPassword !== confirmPassword){ errEl.textContent = "Passwords don't match."; return; }
    btn.disabled = true; btn.textContent = 'Updating…';
    try{
      const res = await fetch('/api/auth/reset-password', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${accessToken}` },
        body: JSON.stringify({ newPassword })
      });
      const data = await res.json();
      if(!data.success) throw new Error(data.error);
      document.getElementById('resetCard').style.display = 'none';
      document.getElementById('successCard').style.display = 'block';
    }catch(err){
      errEl.textContent = err.message;
      btn.disabled = false; btn.textContent = 'Update password';
    }
  }
</script>
</body>
</html>

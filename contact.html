<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Contact — Have a Great Summer</title>
<meta name="description" content="Get in touch about Have a Great Summer." />
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#2C2350; --ink-soft:#6A6190;
    --coral:#FF5A7A; --grape:#8B6CF0;
    --display:'Fredoka',system-ui,sans-serif; --body:'Nunito',system-ui,-apple-system,sans-serif;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;font-family:var(--body);color:var(--ink);
    background:
      radial-gradient(1200px 600px at 12% -8%, #FFE6B8 0%, transparent 55%),
      radial-gradient(1000px 600px at 100% 0%, #FFC7DE 0%, transparent 50%),
      radial-gradient(900px 700px at 50% 120%, #BDEBC9 0%, transparent 55%),
      #FFF7EC;
    min-height:100vh;-webkit-font-smoothing:antialiased;
  }
  .topbar{display:flex;align-items:center;justify-content:space-between;max-width:680px;margin:0 auto;padding:26px 24px;flex-wrap:wrap;gap:10px;}
  .nav-links{display:flex;gap:18px;align-items:center;flex-wrap:wrap;}
  .nav-links a{font-family:var(--display);font-weight:600;font-size:14px;color:var(--ink-soft);text-decoration:none;transition:color .15s;}
  .nav-links a:hover{color:var(--grape);}
  .nav-links a.current{color:var(--coral);}
  @media(max-width:480px){ .topbar{justify-content:center;text-align:center;} .nav-links{justify-content:center;width:100%;} }
  .brand{font-family:var(--display);font-weight:700;font-size:17px;color:var(--ink);text-decoration:none;}
  .topbar a.back{font-family:var(--display);font-weight:600;font-size:14px;color:var(--grape);text-decoration:none;}
  main{max-width:560px;margin:0 auto;padding:20px 24px 70px;}
  h1{font-family:var(--display);font-weight:700;font-size:clamp(32px,6vw,46px);letter-spacing:-.01em;margin:10px 0 14px;}
  .sub{font-size:17px;color:var(--ink-soft);margin:0 0 28px;line-height:1.55;}
  .card{background:rgba(255,255,255,.75);border:2px solid #fff;border-radius:22px;padding:28px;box-shadow:0 24px 50px -32px rgba(70,40,90,.35);}
  label{display:block;font-family:var(--display);font-weight:600;font-size:14px;margin:0 0 8px;}
  input,textarea{width:100%;font-family:var(--body);font-weight:600;font-size:16px;color:var(--ink);padding:13px 15px;border-radius:13px;border:2px solid #efe6f5;background:#fff;margin-bottom:16px;}
  textarea{resize:vertical;line-height:1.5;}
  input:focus,textarea:focus{outline:none;border-color:var(--grape);box-shadow:0 0 0 4px rgba(139,108,240,.18);}
  button{font-family:var(--display);font-weight:700;font-size:17px;color:#fff;cursor:pointer;border:none;padding:14px 28px;border-radius:14px;background:linear-gradient(95deg,var(--coral),var(--grape));box-shadow:0 12px 26px -10px rgba(255,90,122,.5);}
  .err{color:var(--coral);font-size:13px;min-height:0;margin-bottom:10px;}
  .err:empty{display:none;}
  .done{display:none;text-align:center;padding:10px 0;}
  .done.show{display:block;}
  .done p{font-family:var(--display);font-weight:600;font-size:18px;}
  .direct{margin-top:22px;font-size:15px;color:var(--ink-soft);text-align:center;}
  footer{text-align:center;padding:30px 0 50px;color:var(--ink-soft);font-weight:600;font-size:13px;}

  /* ---------- auth nav ---------- */
  .auth-nav{ display:flex;align-items:center; }
  .auth-nav-btn{
    font-family:var(--display);font-weight:700;font-size:14px;color:#fff;cursor:pointer;border:none;
    background:linear-gradient(95deg,var(--coral),var(--grape));padding:9px 18px;border-radius:12px;
    transition:transform .12s ease;
  }
  .auth-nav-btn:hover{ transform:translateY(-1px); }
  .auth-nav-user{ font-family:var(--display);font-weight:600;font-size:13px;color:var(--ink-soft);display:flex;align-items:center;gap:10px; }
  .auth-nav-signout{
    font-family:var(--display);font-weight:700;font-size:13px;color:var(--grape);cursor:pointer;
    background:transparent;border:2px solid var(--grape);padding:6px 14px;border-radius:10px;
  }
</style>
</head>
<body>
<div class="topbar">
  <a class="brand" href="/">☀️ Have a Great Summer</a>
  <nav class="nav-links">
    <a href="/">Home</a>
    <a href="/gallery.html">Inspiration</a>
    <a href="/my-lists.html">My Lists</a>
    <a href="/about.html">About</a>
    <a href="/contact.html" class="current">Contact</a>
  </nav>
  <div class="auth-nav" id="authNav"></div>
</div>

<main>
  <h1>Say "Hi"</h1>
  <p class="sub">Found a bug, have an idea, or just want to share your list? This goes straight to a real person.</p>

  <div class="card">
    <form id="contactForm" novalidate>
      <input type="text" name="_gotcha" tabindex="-1" autocomplete="off" aria-hidden="true" style="position:absolute;left:-9999px;opacity:0;height:0;width:0;">
      <label for="cName">Name (optional)</label>
      <input type="text" id="cName" name="name" placeholder="Your name" />
      <label for="cEmail">Email</label>
      <input type="email" id="cEmail" name="email" placeholder="you@email.com" required />
      <label for="cMsg">Message</label>
      <textarea id="cMsg" name="message" rows="5" placeholder="How you doing?" required></textarea>
      <div class="err" id="cErr"></div>
      <button type="submit">Send message</button>
    </form>
    <div class="done" id="cDone"><p>🎉 Sent! I'll get back to you soon.</p></div>
  </div>


</main>

<footer>Have a Great Summer · Made for sunny days</footer>

<script>
const CONTACT_ENDPOINT = "https://formspree.io/f/xnjyeozz"; // dedicated contact form (separate from the homepage email signup)
document.getElementById('contactForm').addEventListener('submit', async function(e){
  e.preventDefault();
  const form = e.target;
  const email = document.getElementById('cEmail').value.trim();
  const msg = document.getElementById('cMsg').value.trim();
  const err = document.getElementById('cErr');
  err.textContent = '';
  if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){ err.textContent = "That email doesn't look right."; return; }
  if(!msg){ err.textContent = "Mind adding a quick message?"; return; }
  const btn = form.querySelector('button');
  btn.textContent = 'Sending…'; btn.disabled = true;
  try{
    const res = await fetch(CONTACT_ENDPOINT, { method:'POST', headers:{'Accept':'application/json'}, body:new FormData(form) });
    if(!res.ok) throw new Error('network');
    form.style.display = 'none';
    document.getElementById('cDone').classList.add('show');
  }catch(e){
    err.textContent = "Couldn't send that — try again in a moment.";
    btn.textContent = 'Send message'; btn.disabled = false;
  }
});
</script>

<script>
/* Minimal auth nav for sub-pages — checks session and shows signed-in state.
   Clicking Sign In redirects to homepage where the full modal lives. */
const AUTH_KEY = 'hags_auth';
function getSession(){ try{ return JSON.parse(localStorage.getItem(AUTH_KEY)); }catch(e){ return null; } }
function clearSession(){ localStorage.removeItem(AUTH_KEY); }

function updateAuthNav(){
  const session = getSession();
  const nav = document.getElementById('authNav');
  if(!nav) return;
  if(session && session.user){
    nav.innerHTML = `<div class="auth-nav-user"><span>${session.user.email}</span><button class="auth-nav-signout" onclick="handleSignout()">Sign out</button></div>`;
  } else {
    nav.innerHTML = `<button class="auth-nav-btn" onclick="window.location.href='/?signin=1'">Sign in</button>`;
  }
}

function handleSignout(){
  clearSession();
  updateAuthNav();
}

updateAuthNav();
</script>
</body>
</html>
